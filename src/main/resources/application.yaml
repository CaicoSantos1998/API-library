spring:
  application:
    name: library.api
  datasource:
      url: ${DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
  security:
    oauth2:
      resource-server:
        jwt:
          issuer-uri: ${ISSUER_URI}
  jpa:
    show-sql: true
    properties:
      hibernate.format_sql: true
springdoc:
  override-with-generic-response: false
